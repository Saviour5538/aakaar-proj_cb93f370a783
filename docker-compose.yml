version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: appdb
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appuser']
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://appuser:secret@postgres:5432/appdb
      JWT_SECRET: changeme_in_prod
      PORT: 8000
    volumes:
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  pgvector:
    image: ankane/pgvector:latest
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: vectoruser
      POSTGRES_PASSWORD: vectorsecret
      POSTGRES_DB: vectordb
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vectoruser']
      interval: 5s
      retries: 5
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  model_cache:
  pgvector_data: